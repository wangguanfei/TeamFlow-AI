server:
  port: 8080
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  tomcat:
    max-swallow-size: 500MB

spring:
  application:
    name: teamflow-ai
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:teamflow_ai}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:wgf123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
      # 容错：兼容旧库的 ALTER ADD COLUMN 在新库会因列已存在而报错，需跳过继续
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

teamflow:
  demo-data:
    enabled: ${DEMO_DATA_ENABLED:false}
  jwt:
    issuer: teamflow-ai
    secret: ${JWT_SECRET:teamflow-ai-local-development-secret-change-me-64bytes}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
  cors:
    allowed-origins: ${TEAMFLOW_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:teamflow-ai}
  ai:
    provider: ${AI_PROVIDER:deepseek}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
  rag:
    enabled: ${RAG_ENABLED:true}
    local-embedding: ${RAG_LOCAL_EMBEDDING:true}
    min-available-memory-mb: ${RAG_MIN_AVAILABLE_MEMORY_MB:250}
    qdrant:
      base-url: ${QDRANT_BASE_URL:http://127.0.0.1:6333}
      api-key: ${QDRANT_API_KEY:}
      collection: ${QDRANT_COLLECTION:teamflow_ai_knowledge_chunks}
      vector-name: ${QDRANT_VECTOR_NAME:dense}
      dimension: ${EMBEDDING_DIMENSION:512}
    embedding:
      base-url: ${EMBEDDING_BASE_URL:http://127.0.0.1:8000}
      model: ${EMBEDDING_MODEL:BAAI/bge-small-zh-v1.5}
      max-text-chars: ${EMBEDDING_MAX_TEXT_CHARS:4000}
    retrieval:
      dense-top-k: ${RAG_DENSE_TOP_K:20}
      keyword-top-k: ${RAG_KEYWORD_TOP_K:20}
      final-top-k: ${RAG_FINAL_TOP_K:5}
      dense-weight: ${RAG_DENSE_WEIGHT:0.7}
      keyword-weight: ${RAG_KEYWORD_WEIGHT:0.3}
    index:
      worker-enabled: ${RAG_INDEX_WORKER_ENABLED:true}
      max-attempts: ${RAG_INDEX_MAX_ATTEMPTS:3}
      worker-delay-ms: ${RAG_INDEX_WORKER_DELAY_MS:5000}
      retry-backoff-ms: ${RAG_INDEX_RETRY_BACKOFF_MS:30000}
  deploy:
    enabled: ${DEPLOY_ENABLED:false}
    script-path: ${DEPLOY_SCRIPT_PATH:}
    log-dir: ${DEPLOY_LOG_DIR:logs/deploy}
    timeout-minutes: ${DEPLOY_TIMEOUT_MINUTES:30}

logging:
  level:
    com.teamflow.ai: INFO
