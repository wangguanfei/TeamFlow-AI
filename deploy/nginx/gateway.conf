# ── www 统一 301 回主域名（Umami 已迁移到 ai2026.vip/umami 子路径）────────
server {
  listen 443 ssl;
  server_name www.ai2026.vip;

  ssl_certificate /etc/nginx/certs/ai2026.vip/ai2026.vip_bundle.crt;
  ssl_certificate_key /etc/nginx/certs/ai2026.vip/ai2026.vip.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=15552000" always;

  return 301 https://ai2026.vip$request_uri;
}

# ── 工具页面：独立 origin，与 Vue 应用完全隔离 ─────────────
# 后期配子域名时，将 listen 8090 改为 listen 80 + server_name tools.yourdomain.com 即可
server {
  listen 8090;
  server_name _;

  root /usr/share/nginx/html/cc;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Cache-Control "no-store" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/index.html =404;
  }
}

