# ── 主应用：Vue SPA + 后端 API ──────────────────────────────
server {
  listen 80;
  server_name _;
  client_max_body_size 500m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # 用变量 + resolver 延迟 DNS 解析，避免 Nginx 启动时 upstream 未就绪报错
  resolver 127.0.0.11 valid=30s;
  location / {
    set $upstream http://frontend:80;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_upgrade;
  }
}

# ── 工具页面：独立 origin，与 Vue 应用完全隔离 ─────────────
# 后期配子域名时，将 listen 8090 改为 listen 80 + server_name tools.yourdomain.com 即可
server {
  listen 8090;
  server_name _;

  root /usr/share/nginx/html/cc;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Cache-Control "no-store" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/index.html =404;
  }
}

# ── Umami 访问统计面板 ──────────────────────────────────────
server {
  listen 8091;
  server_name _;

  resolver 127.0.0.11 valid=30s;
  location / {
    set $umami http://umami:3000;
    proxy_pass $umami;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
