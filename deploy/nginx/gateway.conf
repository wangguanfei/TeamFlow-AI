# ── 主域名：HTTP 跳转 HTTPS ────────────────────────────────
server {
  listen 80;
  server_name ai2026.vip www.ai2026.vip;

  return 301 https://$host$request_uri;
}

# ── 主应用：Vue SPA + 后端 API（HTTP/IP 兜底）──────────────
server {
  listen 80 default_server;
  server_name _;
  client_max_body_size 500m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /cc {
    return 301 https://$host/cc/;
  }

  location /cc/ {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ =404;
  }

  location = /umami {
    return 301 https://$host/umami/;
  }

  location /umami/ {
    set $umami http://umami:3000;
    rewrite ^/umami/(.*)$ /$1 break;
    proxy_pass $umami;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /umami;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_set_header Accept-Encoding "";
    proxy_redirect ~^(/.*)$ /umami$1;
    sub_filter_once off;
    sub_filter_types text/html text/css application/javascript text/javascript application/json;
    sub_filter 'href="/' 'href="/umami/';
    sub_filter 'src="/' 'src="/umami/';
    sub_filter 'action="/' 'action="/umami/';
    sub_filter 'content="/' 'content="/umami/';
    sub_filter 'url(/' 'url(/umami/';
    sub_filter '"/api/' '"/umami/api/';
    sub_filter "'/api/" "'/umami/api/";
    sub_filter '"/_next/' '"/umami/_next/';
    sub_filter "'/_next/" "'/umami/_next/";
    proxy_read_timeout 60s;
  }

  # 用变量 + resolver 延迟 DNS 解析，避免 Nginx 启动时 upstream 未就绪报错
  resolver 127.0.0.11 valid=30s;

  # API 和 WebSocket 直接转发到后端，避免经过 frontend Nginx 导致 $remote_addr 被覆盖
  location /api/ {
    set $backend http://backend:8080;
    proxy_pass $backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
  }

  # SSE 接口（AI 流式 / 部署日志）需要关闭缓冲
  location ~* ^/api/(ai/chat/stream|deploy/stream) {
    set $backend http://backend:8080;
    proxy_pass $backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # WebSocket
  location /ws/ {
    set $backend http://backend:8080;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location / {
    set $upstream http://frontend:80;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }
}

# ── 主应用：Vue SPA + 后端 API（HTTPS）─────────────────────
server {
  listen 443 ssl;
  server_name ai2026.vip www.ai2026.vip;
  client_max_body_size 500m;

  ssl_certificate /etc/nginx/certs/ai2026.vip/ai2026.vip_bundle.crt;
  ssl_certificate_key /etc/nginx/certs/ai2026.vip/ai2026.vip.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=15552000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
