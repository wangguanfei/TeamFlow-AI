services:
  mysql:
    image: mysql:8.4
    container_name: teamflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teamflow_ai}
      TZ: ${TZ:-Asia/Shanghai}
    # 不对宿主机暴露 3306，仅 compose 内网访问，避免公网爆破
    expose:
      - "3306"
    volumes:
      - teamflow_mysql:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: teamflow-redis
    expose:
      - "6379"
    volumes:
      - teamflow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: teamflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    # 文件下载由后端流式代理，浏览器无需直连 MinIO，故不对公网暴露。
    # 需访问 Console(9001) 或 API(9000) 时建议用 SSH 隧道，而非放行公网端口。
    expose:
      - "9000"
      - "9001"
    volumes:
      - teamflow_minio:/data

  backend:
    build:
      context: ./backend
    container_name: teamflow-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Duser.timezone=Asia/Shanghai}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teamflow_ai}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TEAMFLOW_CORS_ALLOWED_ORIGINS: ${TEAMFLOW_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://81.69.248.152,https://81.69.248.152,https://ai2026.vip,https://www.ai2026.vip}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
    # 日志落盘到宿主机，容器重建/重启也不丢；对应 logback 默认 LOG_DIR=./logs(容器内 /app/logs)
    volumes:
      - ./logs/backend:/app/logs
    # 仅 compose 内网暴露 8080，前端通过 nginx 反代访问；如需公网直连调试再改回 ports 映射
    expose:
      - "8080"
    # temurin(JRE) 镜像不带 wget/curl，用 bash 的 /dev/tcp 做 TCP 端口探测
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: teamflow-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  teamflow_mysql:
  teamflow_redis:
  teamflow_minio:
