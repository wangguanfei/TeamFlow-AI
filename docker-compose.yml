services:
  mysql:
    image: mysql:8.4
    container_name: teamflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teamflow_ai}
      TZ: ${TZ:-Asia/Shanghai}
    # 不对宿主机暴露 3306，仅 compose 内网访问，避免公网爆破
    expose:
      - "3306"
    volumes:
      - teamflow_mysql:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci", "--max-connections=80"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: teamflow-redis
    expose:
      - "6379"
    volumes:
      - teamflow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: teamflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    # 文件下载由后端流式代理，浏览器无需直连 MinIO，故不对公网暴露。
    # 需访问 Console(9001) 或 API(9000) 时建议用 SSH 隧道，而非放行公网端口。
    expose:
      - "9000"
      - "9001"
    volumes:
      - teamflow_minio:/data

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: teamflow-qdrant
    expose:
      - "6333"
    volumes:
      - teamflow_qdrant:/qdrant/storage
    mem_limit: ${QDRANT_MEM_LIMIT:-384m}
    cpus: ${QDRANT_CPUS:-0.75}

  embedding:
    build:
      context: ./embedding-service
    container_name: teamflow-embedding
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-1}
      EMBEDDING_MAX_TEXT_CHARS: ${EMBEDDING_MAX_TEXT_CHARS:-4000}
      HF_HOME: /app/models
      TRANSFORMERS_CACHE: /app/models
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    expose:
      - "8000"
    volumes:
      - teamflow_embedding_cache:/models
    mem_limit: ${EMBEDDING_MEM_LIMIT:-768m}
    cpus: ${EMBEDDING_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: teamflow-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      embedding:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx256m -Duser.timezone=Asia/Shanghai}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teamflow_ai}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TEAMFLOW_CORS_ALLOWED_ORIGINS: ${TEAMFLOW_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://81.69.248.152,https://81.69.248.152,https://ai2026.vip,https://www.ai2026.vip}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_LOCAL_EMBEDDING: ${RAG_LOCAL_EMBEDDING:-true}
      RAG_MIN_AVAILABLE_MEMORY_MB: ${RAG_MIN_AVAILABLE_MEMORY_MB:-250}
      QDRANT_BASE_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-teamflow_ai_knowledge_chunks}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-dense}
      EMBEDDING_BASE_URL: http://embedding:8000
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-512}
      EMBEDDING_MAX_TEXT_CHARS: ${EMBEDDING_MAX_TEXT_CHARS:-4000}
      RAG_DENSE_TOP_K: ${RAG_DENSE_TOP_K:-20}
      RAG_KEYWORD_TOP_K: ${RAG_KEYWORD_TOP_K:-20}
      RAG_FINAL_TOP_K: ${RAG_FINAL_TOP_K:-5}
      RAG_INDEX_WORKER_ENABLED: ${RAG_INDEX_WORKER_ENABLED:-true}
      RAG_INDEX_WORKER_DELAY_MS: ${RAG_INDEX_WORKER_DELAY_MS:-5000}
      DEPLOY_ENABLED: ${DEPLOY_ENABLED:-false}
      DEPLOY_LOG_DIR: ${DEPLOY_LOG_DIR:-/app/logs/deploy}
    # 日志落盘到宿主机，容器重建/重启也不丢；对应 logback 默认 LOG_DIR=./logs(容器内 /app/logs)
    # 部署管理：触发文件和日志文件通过 logs/backend 卷与宿主机 deploy-agent.sh 共享
    volumes:
      - ./logs/backend:/app/logs
    # 仅 compose 内网暴露 8080，前端通过 nginx 反代访问；如需公网直连调试再改回 ports 映射
    expose:
      - "8080"
    # temurin(JRE) 镜像不带 wget/curl，用 bash 的 /dev/tcp 做 TCP 端口探测
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: teamflow-frontend
    depends_on:
      backend:
        condition: service_healthy
    # 80 端口仅对内网暴露，由 gateway 统一对外代理
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  umami:
    image: ghcr.io/umami-software/umami:mysql-latest
    container_name: teamflow-umami
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET is required}
      DISABLE_TELEMETRY: "1"
    expose:
      - "3000"
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: teamflow-gateway
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "8091:8091"
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs/ai2026.vip:/etc/nginx/certs/ai2026.vip:ro
      - ./cc-tools:/usr/share/nginx/html/cc:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  teamflow_mysql:
  teamflow_redis:
  teamflow_minio:
  teamflow_qdrant:
  teamflow_embedding_cache:
