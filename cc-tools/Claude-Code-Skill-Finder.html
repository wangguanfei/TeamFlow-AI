<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude检索</title>
  <script defer src="http://81.69.248.152:8091/script.js" data-website-id="0d856dd6-4287-44b2-a4d4-4f2420920041"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-strong: #f8fafc;
      --text: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --line-strong: #c6d3df;
      --teal: #0f766e;
      --teal-soft: #e6f4f1;
      --blue: #2563eb;
      --blue-soft: #e9f0ff;
      --amber: #b7791f;
      --amber-soft: #fff5dd;
      --red: #b42318;
      --red-soft: #fff0ed;
      --shadow: 0 18px 48px rgba(20, 37, 63, .12);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0;
    }
    button, input { font: inherit; }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-mark {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      color: var(--teal);
    }
    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      color: #111827;
    }
    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: #344054;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
    }
    .icon-btn:hover, .icon-btn.active {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-soft);
    }
    .shell {
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .rail, .main-panel, .search-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .rail {
      position: sticky;
      top: 18px;
      padding: 16px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-strong);
    }
    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      color: #111827;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .section-title {
      margin: 18px 0 10px;
      font-size: 13px;
      color: #475467;
      font-weight: 700;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .chip:hover, .chip.active {
      border-color: var(--teal);
      background: var(--teal-soft);
      color: var(--teal);
    }
    .note {
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #614700;
      border: 1px solid #f2d891;
      font-size: 13px;
    }
    .main-panel { overflow: hidden; }
    .search-panel {
      box-shadow: none;
      border-width: 0 0 1px;
      border-radius: 0;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .search-box {
      position: relative;
    }
    .search-box svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #667085;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 14px 0 42px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    #searchInput:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }
    .result-meta {
      color: var(--muted);
      white-space: nowrap;
    }
    .type-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .type-tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 34px;
      padding: 6px 10px;
      background: #fff;
      color: #344054;
      cursor: pointer;
    }
    .type-tab.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .results {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }
    .results.list {
      grid-template-columns: 1fr;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-height: 214px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .list .card {
      min-height: 0;
    }
    .card-head {
      padding: 13px 14px 10px;
      border-bottom: 1px solid #edf1f5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      word-break: break-word;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.skill { color: var(--teal); background: var(--teal-soft); }
    .badge.command { color: var(--blue); background: var(--blue-soft); }
    .badge.agent { color: var(--amber); background: var(--amber-soft); }
    .badge.rule { color: var(--red); background: var(--red-soft); }
    .card-body {
      padding: 12px 14px;
    }
    .purpose {
      margin: 0;
      color: #344054;
    }
    .tag-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      font-size: 12px;
      color: #475467;
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      border-radius: 999px;
      padding: 2px 7px;
    }
    .card-foot {
      padding: 12px 14px 14px;
      border-top: 1px solid #edf1f5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      background: #fbfcfd;
    }
    .example {
      margin: 0;
      color: #475467;
      font-size: 13px;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .copy-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .copy-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-soft);
    }
    .empty {
      grid-column: 1 / -1;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 10px 12px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 940px) {
      .page { padding: 16px; }
      .topbar { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .shell { grid-template-columns: 1fr; }
      .rail { position: static; }
      .search-panel { position: static; }
    }
    @media (max-width: 560px) {
      .brand { align-items: flex-start; }
      .brand-mark { width: 42px; height: 42px; }
      .brand h1 { font-size: 20px; }
      .search-row { grid-template-columns: 1fr; }
      .result-meta { white-space: normal; }
      .results { grid-template-columns: 1fr; padding: 12px; }
      .card-foot { grid-template-columns: 1fr auto; }
    }
  </style>
</head>

  <script>
    const DATA = JSON.parse(document.getElementById("capability-data").textContent);
    const ITEMS = DATA.items;
    const state = { q: "", type: "skill", tag: "全部", view: "grid" };
    const typeLabels = [
      ["all", "全部"],
      ["skill", "技能"],
      ["command", "命令"],
      ["agent", "代理"],
      ["rule", "规则"]
    ];
    const scenarioTags = ["全部", "计划", "上下文", "后端", "Spring Boot", "前端", "测试", "安全", "数据库", "部署", "评审", "验证", "评测", "Python", "GitHub", "文档", "LLM", "重构", "配置", "自动化", "构建", "架构"];

    const els = {
      search: document.getElementById("searchInput"),
      results: document.getElementById("results"),
      meta: document.getElementById("resultMeta"),
      typeTabs: document.getElementById("typeTabs"),
      tagChips: document.getElementById("tagChips"),
      toast: document.getElementById("toast"),
      gridBtn: document.getElementById("gridBtn"),
      listBtn: document.getElementById("listBtn"),
      resetBtn: document.getElementById("resetBtn")
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function filteredItems() {
      const q = normalize(els.search.value);
      return ITEMS.filter((item) => {
        const typeOk = state.type === "all" || item.type === state.type;
        const tagOk = state.tag === "全部" || item.tags.includes(state.tag) || item.search.includes(normalize(state.tag));
        const queryOk = !q || item.search.includes(q);
        return typeOk && tagOk && queryOk;
      });
    }

    function renderTabs() {
      const q = normalize(els.search.value);
      const baseFiltered = ITEMS.filter((item) => {
        const tagOk = state.tag === "全部" || item.tags.includes(state.tag) || item.search.includes(normalize(state.tag));
        const queryOk = !q || item.search.includes(q);
        return tagOk && queryOk;
      });
      els.typeTabs.innerHTML = typeLabels.map(([key, label]) => {
        const count = key === "all" ? baseFiltered.length : baseFiltered.filter((item) => item.type === key).length;
        return '<button class="type-tab ' + (state.type === key ? "active" : "") + '" data-type="' + key + '">' + label + ' <span>' + count + '</span></button>';
      }).join("");
      els.tagChips.innerHTML = scenarioTags.map((tag) => {
        return '<button class="chip ' + (state.tag === tag ? "active" : "") + '" data-tag="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</button>';
      }).join("");
    }

    function card(item) {
      const tags = item.tags.slice(0, 4).map((tag) => '<span class="tag">' + escapeHtml(tag) + '</span>').join("");
      return '<article class="card">' +
        '<div class="card-head">' +
          '<h2 class="name">' + escapeHtml(item.name) + '</h2>' +
          '<span class="badge ' + item.type + '">' + escapeHtml(item.typeLabel) + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<p class="purpose">' + escapeHtml(item.purpose) + '</p>' +
          '<div class="tag-row">' + tags + '</div>' +
        '</div>' +
        '<div class="card-foot">' +
          '<p class="example">' + escapeHtml(item.example) + '</p>' +
          '<button class="copy-btn" data-copy="' + escapeHtml(item.example) + '" title="复制调用示例" aria-label="复制调用示例">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 8V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-3M5 8h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>' +
          '</button>' +
        '</div>' +
      '</article>';
    }

    function renderResults() {
      const list = filteredItems();
      els.results.classList.toggle("list", state.view === "list");
      els.meta.textContent = "找到 " + list.length + " 项";
      if (!list.length) {
        els.results.innerHTML = '<div class="empty">没有匹配结果。换一个关键词，或清空筛选。</div>';
        return;
      }
      els.results.innerHTML = list.map(card).join("");
    }

    function render() {
      renderTabs();
      renderResults();
      els.gridBtn.classList.toggle("active", state.view === "grid");
      els.listBtn.classList.toggle("active", state.view === "list");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
      els.toast.classList.add("show");
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => els.toast.classList.remove("show"), 1300);
    }

    els.search.addEventListener("input", (event) => {
      state.q = event.target.value;
      render();
    });
    els.search.addEventListener("change", (event) => {
      state.q = event.target.value;
      render();
    });
    els.typeTabs.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-type]");
      if (!btn) return;
      state.type = btn.dataset.type;
      render();
    });
    els.tagChips.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-tag]");
      if (!btn) return;
      state.tag = btn.dataset.tag;
      render();
    });
    els.results.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-copy]");
      if (!btn) return;
      copyText(btn.dataset.copy);
    });
    els.gridBtn.addEventListener("click", () => { state.view = "grid"; render(); });
    els.listBtn.addEventListener("click", () => { state.view = "list"; render(); });
    els.resetBtn.addEventListener("click", () => {
      state.q = "";
      state.type = "skill";
      state.tag = "全部";
      els.search.value = "";
      render();
      els.search.focus();
    });
    render();
  </script>
