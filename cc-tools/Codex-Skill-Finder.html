<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex 能力检索台</title>
  <script defer src="/umami/script.js" data-website-id="0d856dd6-4287-44b2-a4d4-4f2420920041"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-strong: #f8fafc;
      --text: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --line-strong: #c6d3df;
      --green: #047857;
      --green-soft: #ecfdf5;
      --blue: #2563eb;
      --blue-soft: #e9f0ff;
      --amber: #b7791f;
      --amber-soft: #fff5dd;
      --red: #b42318;
      --red-soft: #fff0ed;
      --purple: #6d28d9;
      --purple-soft: #f3f0ff;
      --cyan: #0369a1;
      --cyan-soft: #e8f4ff;
      --shadow: 0 18px 48px rgba(20, 37, 63, .12);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0;
    }
    button, input { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-mark {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      color: var(--green);
    }
    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      color: #111827;
    }
    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .text-btn, .icon-btn {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: #344054;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .text-btn {
      gap: 6px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .icon-btn {
      width: 40px;
      padding: 0;
    }
    .text-btn:hover, .icon-btn:hover, .icon-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
      text-decoration: none;
    }
    .shell {
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .rail, .main-panel, .search-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .rail {
      position: sticky;
      top: 18px;
      padding: 16px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-strong);
    }
    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      color: #111827;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .section-title {
      margin: 18px 0 10px;
      font-size: 13px;
      color: #475467;
      font-weight: 700;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .chip:hover, .chip.active {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }
    .note {
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #614700;
      border: 1px solid #f2d891;
      font-size: 13px;
    }
    .note a {
      color: #7c4a03;
      font-weight: 700;
      text-decoration: underline;
    }
    .main-panel { overflow: hidden; }
    .search-panel {
      box-shadow: none;
      border-width: 0 0 1px;
      border-radius: 0;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .search-box {
      position: relative;
    }
    .search-box svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #667085;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 14px 0 42px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    #searchInput:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(4, 120, 87, .14);
    }
    .result-meta {
      color: var(--muted);
      white-space: nowrap;
    }
    .type-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .type-tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 34px;
      padding: 6px 10px;
      background: #fff;
      color: #344054;
      cursor: pointer;
    }
    .type-tab.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .results {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }
    .results.list {
      grid-template-columns: 1fr;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-height: 244px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .list .card { min-height: 0; }
    .card-head {
      padding: 13px 14px 10px;
      border-bottom: 1px solid #edf1f5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      word-break: break-word;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.surface { color: var(--green); background: var(--green-soft); }
    .badge.workflow { color: var(--blue); background: var(--blue-soft); }
    .badge.skill { color: var(--purple); background: var(--purple-soft); }
    .badge.plugin { color: var(--cyan); background: var(--cyan-soft); }
    .badge.mcp { color: var(--amber); background: var(--amber-soft); }
    .badge.hook { color: var(--red); background: var(--red-soft); }
    .badge.config { color: #475467; background: #eef2f6; }
    .badge.command { color: #0f766e; background: #dcfce7; }
    .badge.automation { color: #854d0e; background: #fef3c7; }
    .badge.security { color: #991b1b; background: #fee2e2; }
    .card-body {
      padding: 12px 14px;
    }
    .purpose, .when {
      margin: 0;
      color: #344054;
    }
    .when {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .tag-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      font-size: 12px;
      color: #475467;
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      border-radius: 999px;
      padding: 2px 7px;
    }
    .card-foot {
      padding: 12px 14px 14px;
      border-top: 1px solid #edf1f5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      background: #fbfcfd;
    }
    .example {
      margin: 0;
      color: #475467;
      font-size: 13px;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .copy-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .copy-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }
    .empty {
      grid-column: 1 / -1;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 10px 12px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 940px) {
      .page { padding: 16px; }
      .topbar { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .shell { grid-template-columns: 1fr; }
      .rail { position: static; }
      .search-panel { position: static; }
    }
    @media (max-width: 560px) {
      .brand { align-items: flex-start; }
      .brand-mark { width: 42px; height: 42px; }
      .brand h1 { font-size: 20px; }
      .search-row { grid-template-columns: 1fr; }
      .result-meta { white-space: normal; }
      .results { grid-template-columns: 1fr; padding: 12px; }
      .card-foot { grid-template-columns: 1fr auto; }
    }
  </style>
</head>

  <script>
    const ITEMS = [
      { type: "surface", typeLabel: "入口", name: "Codex Desktop App", purpose: "桌面端多线程协作入口，适合本地项目、工作树、云任务、浏览器验证、插件和自动化管理。", when: "项目开发主工作台，尤其适合边改边验和多任务并行。", example: "打开当前项目，让 Codex 在 Local 模式完成这个功能，并在浏览器里验证结果。", tags: ["项目初始化", "编码", "测试", "Git", "桌面"] },
      { type: "surface", typeLabel: "入口", name: "Codex CLI", purpose: "终端优先的本地编码代理，可读写文件、运行命令、管理 MCP、插件、hooks 和会话。", when: "适合习惯终端、需要脚本化、远程 SSH 或非交互执行的开发者。", example: "codex --cd /path/to/repo --sandbox workspace-write --ask-for-approval on-request", tags: ["命令", "编码", "测试", "配置"] },
      { type: "surface", typeLabel: "入口", name: "Codex IDE Extension", purpose: "把编辑器打开文件、选区和诊断带入 Codex 上下文，适合在 VS Code 或 JetBrains 内就地协作。", when: "处理当前文件、局部重构、解释编辑器选区和快速修复时使用。", example: "把 IDE 当前选中的组件作为上下文，请 Codex 修复这个渲染问题。", tags: ["编码", "前端", "上下文", "桌面"] },
      { type: "surface", typeLabel: "入口", name: "Codex Cloud", purpose: "在云端容器里执行任务，支持环境设置、依赖安装、PR 修复和后台工作。", when: "适合耗时任务、CI 修复、PR 跟进或不想阻塞本机的工作。", example: "@codex fix the CI failures", tags: ["云端", "测试", "协作", "部署"] },
      { type: "workflow", typeLabel: "流程", name: "需求澄清", purpose: "让 Codex 先收敛目标、上下文、约束和完成标准，避免直接进入错误实现。", when: "需求模糊、跨模块改动、业务规则不完整时。", example: "先问我最多 5 个关键问题，把需求收敛成可执行清单，暂时不要改代码。", tags: ["规划", "项目初始化", "技巧"] },
      { type: "workflow", typeLabel: "流程", name: "计划模式 /plan", purpose: "切换到规划优先的工作方式，让 Codex 先读代码、识别风险、给出步骤，再进入实现。", when: "复杂功能、架构调整、大规模重构、迁移和风险较高的任务。", example: "/plan 为这个支付回调幂等改造制定实现计划，包含文件、测试和回滚点。", tags: ["规划", "命令", "安全"] },
      { type: "workflow", typeLabel: "流程", name: "目标模式 /goal", purpose: "给 Codex 一个持续目标，让它跨多个动作保持完成条件和当前状态。", when: "需要持续推进到测试通过、部署完成或问题闭环的任务。", example: "/goal 完成登录重构，保持现有测试通过，并只修改 auth 相关文件。", tags: ["规划", "上下文", "自动化"] },
      { type: "workflow", typeLabel: "流程", name: "执行优先开发", purpose: "让 Codex 直接改代码、运行验证、根据结果继续修正，直到满足完成标准。", when: "需求明确且代码范围可控时。", example: "修复这个分页 bug，改完直接运行相关单测和前端页面验证。", tags: ["编码", "测试", "验证"] },

      { type: "workflow", typeLabel: "流程", name: "提交与 PR", purpose: "让 Codex 分组查看 diff、窄范围 stage、写提交信息、推送并创建 PR。", when: "功能完成且验证通过后。", example: "只 stage 这次静态页改动，按 feat(cc-tools): 中文摘要 提交。", tags: ["Git", "协作", "部署"] },

    const state = { type: "all", tag: "全部", view: "grid" };
    const els = {
      search: document.getElementById("searchInput"),
      results: document.getElementById("results"),
      meta: document.getElementById("resultMeta"),
      typeTabs: document.getElementById("typeTabs"),
      tagChips: document.getElementById("tagChips"),
      toast: document.getElementById("toast"),
      gridBtn: document.getElementById("gridBtn"),
      listBtn: document.getElementById("listBtn"),
      resetBtn: document.getElementById("resetBtn"),
      statGrid: document.getElementById("statGrid")
    };

    const normalizedItems = ITEMS.map((item, index) => ({
      ...item,
      id: `${item.type}-${index}`,
      search: normalize([item.typeLabel, item.name, item.purpose, item.when, item.example, item.tags.join(" ")].join(" "))
    }));

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function filteredItems() {
      const q = normalize(els.search.value);
      return normalizedItems.filter((item) => {
        const typeOk = state.type === "all" || item.type === state.type;
        const tagOk = state.tag === "全部" || item.tags.includes(state.tag) || item.search.includes(normalize(state.tag));
        const queryOk = !q || item.search.includes(q);
        return typeOk && tagOk && queryOk;
      });
    }

    function renderStats() {
      const statDefs = [
        ["plugin", "插件"],
        ["mcp", "MCP"],
        ["hook", "Hooks"],
        ["all", "总能力"]
      ];
      els.statGrid.innerHTML = statDefs.map(([key, label]) => {
        const count = key === "all" ? normalizedItems.length : normalizedItems.filter((item) => item.type === key).length;
        return `<div class="stat"><b>${count}</b><span>${label}</span></div>`;
      }).join("");
    }

    function renderTabs() {
      const q = normalize(els.search.value);
      const baseFiltered = normalizedItems.filter((item) => {
        const tagOk = state.tag === "全部" || item.tags.includes(state.tag) || item.search.includes(normalize(state.tag));
        const queryOk = !q || item.search.includes(q);
        return tagOk && queryOk;
      });
      els.typeTabs.innerHTML = typeLabels.map(([key, label]) => {
        const count = key === "all" ? baseFiltered.length : baseFiltered.filter((item) => item.type === key).length;
        return `<button class="type-tab ${state.type === key ? "active" : ""}" data-type="${key}">${label} <span>${count}</span></button>`;
      }).join("");
      els.tagChips.innerHTML = scenarioTags.map((tag) => {
        return `<button class="chip ${state.tag === tag ? "active" : ""}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`;
      }).join("");
    }

    function card(item) {
      const tags = item.tags.slice(0, 5).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      return `<article class="card">
        <div class="card-head">
          <h2 class="name">${escapeHtml(item.name)}</h2>
          <span class="badge ${item.type}">${escapeHtml(item.typeLabel)}</span>
        </div>
        <div class="card-body">
          <p class="purpose">${escapeHtml(item.purpose)}</p>
          <p class="when">适用：${escapeHtml(item.when)}</p>
          <div class="tag-row">${tags}</div>
        </div>
        <div class="card-foot">
          <p class="example">${escapeHtml(item.example)}</p>
          <button class="copy-btn" data-copy="${escapeHtml(item.example)}" title="复制使用示例" aria-label="复制使用示例">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 8V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-3M5 8h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </article>`;
    }

    function renderResults() {
      const list = filteredItems();
      els.results.classList.toggle("list", state.view === "list");
      els.meta.textContent = `找到 ${list.length} 项`;
      if (!list.length) {
        els.results.innerHTML = '<div class="empty">没有匹配结果。换一个关键词，或清空筛选。</div>';
        return;
      }
      els.results.innerHTML = list.map(card).join("");
    }

    function render() {
      renderStats();
      renderTabs();
      renderResults();
      els.gridBtn.classList.toggle("active", state.view === "grid");
      els.listBtn.classList.toggle("active", state.view === "list");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
      els.toast.classList.add("show");
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => els.toast.classList.remove("show"), 1300);
    }

    els.search.addEventListener("input", render);
    els.search.addEventListener("change", render);
    els.typeTabs.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-type]");
      if (!btn) return;
      state.type = btn.dataset.type;
      render();
    });
    els.tagChips.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-tag]");
      if (!btn) return;
      state.tag = btn.dataset.tag;
      render();
    });
    els.results.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-copy]");
      if (!btn) return;
      copyText(btn.dataset.copy);
    });
    els.gridBtn.addEventListener("click", () => { state.view = "grid"; render(); });
    els.listBtn.addEventListener("click", () => { state.view = "list"; render(); });
    els.resetBtn.addEventListener("click", () => {
      state.type = "all";
      state.tag = "全部";
      els.search.value = "";
      render();
      els.search.focus();
    });
    render();
  </script>
</body>
</html>
