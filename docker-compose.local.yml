name: teamflow-ai-local

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: teamflow-local-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${LOCAL_MINIO_API_PORT:-19000}:9000"
      - "${LOCAL_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - teamflow_local_minio:/data

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: teamflow-local-qdrant
    ports:
      - "${LOCAL_QDRANT_PORT:-6333}:6333"
    volumes:
      - teamflow_local_qdrant:/qdrant/storage
    mem_limit: ${QDRANT_MEM_LIMIT:-384m}
    cpus: ${QDRANT_CPUS:-0.75}

  embedding:
    build:
      context: ./embedding-service
    container_name: teamflow-local-embedding
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-1}
      EMBEDDING_MAX_TEXT_CHARS: ${EMBEDDING_MAX_TEXT_CHARS:-4000}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
    ports:
      - "${LOCAL_EMBEDDING_PORT:-18000}:8000"
    volumes:
      - teamflow_local_embedding_cache:/models
    mem_limit: ${EMBEDDING_MEM_LIMIT:-768m}
    cpus: ${EMBEDDING_CPUS:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: teamflow-local-backend
    depends_on:
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      embedding:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx256m -Duser.timezone=Asia/Shanghai}
      MYSQL_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${LOCAL_MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${LOCAL_MYSQL_DATABASE:-teamflow_ai}
      MYSQL_USERNAME: ${LOCAL_MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-wgf123456}
      REDIS_HOST: ${LOCAL_REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${LOCAL_REDIS_PORT:-6379}
      REDIS_DATABASE: ${LOCAL_REDIS_DATABASE:-0}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-teamflow-ai-local-development-secret-change-me-64bytes}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TEAMFLOW_CORS_ALLOWED_ORIGINS: ${TEAMFLOW_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_DEMO_DAILY_LIMIT: ${AI_DEMO_DAILY_LIMIT:-100}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_LOCAL_EMBEDDING: ${RAG_LOCAL_EMBEDDING:-true}
      RAG_MIN_AVAILABLE_MEMORY_MB: ${RAG_MIN_AVAILABLE_MEMORY_MB:-250}
      QDRANT_BASE_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-teamflow_ai_knowledge_chunks}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-dense}
      EMBEDDING_BASE_URL: http://embedding:8000
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-512}
      EMBEDDING_MAX_TEXT_CHARS: ${EMBEDDING_MAX_TEXT_CHARS:-4000}
      RAG_DENSE_TOP_K: ${RAG_DENSE_TOP_K:-20}
      RAG_KEYWORD_TOP_K: ${RAG_KEYWORD_TOP_K:-20}
      RAG_FINAL_TOP_K: ${RAG_FINAL_TOP_K:-5}
      RAG_INDEX_WORKER_ENABLED: ${RAG_INDEX_WORKER_ENABLED:-true}
      RAG_INDEX_WORKER_DELAY_MS: ${RAG_INDEX_WORKER_DELAY_MS:-5000}
      DEPLOY_ENABLED: ${DEPLOY_ENABLED:-false}
      DEPLOY_LOG_DIR: ${DEPLOY_LOG_DIR:-/app/logs/deploy}
    volumes:
      - ./logs/backend:/app/logs
    ports:
      - "${LOCAL_BACKEND_PORT:-8080}:8080"
    mem_limit: ${BACKEND_MEM_LIMIT:-512m}
    cpus: ${BACKEND_CPUS:-1.0}
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: teamflow-local-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${LOCAL_FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  teamflow_local_minio:
  teamflow_local_qdrant:
  teamflow_local_embedding_cache:
